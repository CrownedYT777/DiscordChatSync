# DiscordChatSync Configuration

# Discord Bot Configuration
discord:
  # Your Discord bot token (required)
  token: ""
  # Channel ID to send messages to (required)
  channel-id: ""

# Debug mode - set to true for additional logging
debug: false

# Message configuration
messages:
  # Chat messages from Minecraft to Discord
  chat:
    enabled: true
    format: "**%player%**: %message%"

  # Player join events
  join:
    enabled: true

  # Player leave events
  leave:
    enabled: true

  # Player death events
  death:
    enabled: true

  # Server events
  server:
    enabled: true
    start:
      format: "**Server has started**"
    stop:
      format: "**Server has stopped**"
